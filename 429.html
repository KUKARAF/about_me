<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>429 — Rate Limited</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<img src="https://analytics.osmosis.page/p/4QUhlQWWB" style="display:none" alt="">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #f0ede6;
    --accent: #ff4d00;
    --muted: #444;
    --line: rgba(240,237,230,0.08);
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Radial vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, #0a0a0a 100%);
    pointer-events: none;
  }

  .container {
    max-width: 560px;
    width: 100%;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .code-badge {
    display: inline-block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 22vw, 9rem);
    letter-spacing: -2px;
    line-height: 1;
    color: var(--accent);
    position: relative;
  }

  .code-badge::after {
    content: '429';
    position: absolute;
    inset: 0;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,77,0,0.2);
    transform: translate(4px, 4px);
    z-index: -1;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
    margin: 1.5rem 0;
    animation: grow 0.8s 0.4s cubic-bezier(.16,1,.3,1) both;
    transform-origin: left;
  }

  @keyframes grow {
    from { transform: scaleX(0); opacity: 0; }
    to   { transform: scaleX(1); opacity: 1; }
  }

  .label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeIn 0.5s 0.5s forwards;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    letter-spacing: 1px;
    line-height: 1.15;
    margin-bottom: 1.25rem;
    opacity: 0;
    animation: fadeIn 0.5s 0.6s forwards;
  }

  .body-text {
    font-size: 0.8rem;
    color: rgba(240,237,230,0.6);
    line-height: 1.8;
    opacity: 0;
    animation: fadeIn 0.5s 0.75s forwards;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 2rem;
    padding: 0.7rem 1.4rem;
    border: 1px solid var(--accent);
    color: var(--fg);
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: background 0.2s, color 0.2s;
    opacity: 0;
    animation: fadeIn 0.5s 0.9s forwards;
  }

  .cta:hover {
    background: var(--accent);
    color: #0a0a0a;
  }

  .cta svg { flex-shrink: 0; }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .terminal-line {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 2.5rem;
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeIn 0.5s 1.1s forwards;
  }

  .terminal-line span { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="code-badge">429</div>
  <div class="divider"></div>
  <p class="label">Rate Limited</p>
  <h1 class="headline">You've been<br>rate limited.</h1>
  <p class="body-text">
    You've sent too many requests in a short period of time.<br>
    Please slow down and try again later.
  </p>
  <p class="body-text" style="margin-top:0.75rem">
    If you think this is a mistake, reach out to <strong style="color:var(--fg)">Rafa</strong>.
  </p>
  <a class="cta" href="mailto:hi@osmosis.page">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,12 2,6"/>
    </svg>
    Contact Rafa
  </a>
  <p class="terminal-line">
    <span>$</span> HTTP 429 Too Many Requests — retry-after: soon™
  </p>
</div>
</body>
</html>
